name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    name: Qualité du code
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: ChangeMe
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, pdo_pgsql
          tools: composer:v2
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Lint Symfony container
        run: php bin/console lint:container --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: pgsql://app:ChangeMe@127.0.0.1:5432/app

      - name: Lint Twig templates
        run: php bin/console lint:twig templates/ --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: pgsql://app:ChangeMe@127.0.0.1:5432/app

      - name: PHPStan analysis (level 5)
        run: php vendor/bin/phpstan analyse --no-progress --error-format=github
        env:
          APP_ENV: test
          DATABASE_URL: pgsql://app:ChangeMe@127.0.0.1:5432/app

      - name: Create database
        run: |
          php bin/console doctrine:database:create --env=test --no-interaction
          php bin/console doctrine:schema:create --env=test --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: pgsql://app:ChangeMe@127.0.0.1:5432/app

      - name: Run tests
        run: php bin/phpunit
        env:
          APP_ENV: test
          DATABASE_URL: pgsql://app:ChangeMe@127.0.0.1:5432/app
