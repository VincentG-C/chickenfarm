# Configuration Nginx Heroku — routing Symfony
# Le buildpack heroku-php définit upstream php (socket) et location @php

location / {
    try_files $uri @php;
}

# Protection fichiers sensibles
location ~* \.(env|yml|yaml|md|log|twig)$ { deny all; }

# Cache statique
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    log_not_found off;
    access_log off;
}

client_max_body_size 100M;
