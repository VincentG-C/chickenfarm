# Configuration Nginx pour Heroku - optimisé Symfony
# Le buildpack heroku-php gère déjà PHP-FPM et le passage à index.php
# On ajoute seulement la sécurité et le cache statique

# Sécurité : masquer les fichiers sensibles
location ~* \.(env|yml|yaml|md|log|twig)$ {
    deny all;
}

# Cache statique long pour les assets versionnés
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    log_not_found off;
    access_log off;
}

client_max_body_size 100M;
