# Configuration Nginx Heroku — routing Symfony uniquement
# Le buildpack heroku-php ajoute lui-même son bloc location ~ \.php$
# avec le bon socket FPM. On ne touche PAS à fastcgi_pass ici.

location / {
    try_files $uri /index.php$is_args$args;
}

# Protection fichiers sensibles
location ~* \.(env|yml|yaml|md|log|twig)$ { deny all; }

# Cache statique
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    log_not_found off;
    access_log off;
}

client_max_body_size 100M;
