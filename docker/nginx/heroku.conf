# Configuration Nginx Heroku — Symfony routing
# La config est incluse dans le bloc server du buildpack heroku-php

# Router Symfony : toutes les URLs → index.php
location / {
    try_files $uri /index.php$is_args$args;
}

# PHP-FPM via TCP direct (évite problème d'upstream nommé)
location ~ ^/index\.php(/|$) {
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    internal;
}

# Protection fichiers sensibles
location ~* \.(env|yml|yaml|md|log|twig)$ {
    deny all;
}

# Cache statique long durée
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    log_not_found off;
    access_log off;
}

# Bloquer l'exécution d'autres scripts PHP
location ~ \.php$ {
    return 404;
}

client_max_body_size 100M;
