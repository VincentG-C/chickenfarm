# Configuration Nginx pour Heroku - optimisé Symfony
# Cette config est incluse dans le bloc server du buildpack heroku-php

# Routeur Symfony : toutes les requêtes vers index.php
location / {
    try_files $uri /index.php$is_args$args;
}

# Redirection PHP vers FPM (via config par défaut du buildpack)
location ~ ^/index\.php(/|$) {
    fastcgi_pass php;
    fastcgi_split_path_info ^(.+\.php)(/.*)$;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
    fastcgi_param DOCUMENT_ROOT $realpath_root;
    internal;
}

# Protection contre les fichiers sensibles
location ~* \.(env|yml|yaml|md|log|twig)$ {
    deny all;
}

# Cache statique long pour les assets versionnés
location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    log_not_found off;
    access_log off;
}

# Protection injections PHP directes
location ~ \.php$ {
    return 404;
}

client_max_body_size 100M;
